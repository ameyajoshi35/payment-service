spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_your_key_here}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_your_key_here}

jwt:
  secret: ${JWT_SECRET:c2VjdXJlLXBheW1lbnQtc2VydmljZS1qd3Qtc2VjcmV0LWtleS0yNTYtYml0cy1sb25n}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

payment:
  idempotency-key-ttl-hours: 24
  rate-limit:
    requests-per-minute: 10
    window-size-seconds: 60
  max-transfer-amount: 10000.00
  min-transfer-amount: 0.50

logging:
  level:
    com.payment.service: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}